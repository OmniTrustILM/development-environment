## Load topology and users on boot.
load_definitions = /etc/rabbitmq/definitions.json

## Default vhost / user (admin from definitions.json takes over after import).
default_vhost = /
default_user  = guest
default_pass  = guest

## Listeners.
listeners.tcp.default = 5672
management.tcp.port   = 15672

log.console = true
log.console.level = info
log.file = rabbit.log
log.file.level = info
